server {
    listen 80;
    server_name _;

    # 后端 PHP (server/public)
    set $backend_root /var/www/html/server/public;

    # 后台前端 (admin/dist)
    set $admin_root /usr/share/nginx/html/admin;

    # PC 前端 (pc/.output/public)
    set $pc_root /usr/share/nginx/html/pc;

    # 移动端 H5 (uniapp/dist/build/h5)
    set $mobile_root /usr/share/nginx/html/mobile;

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    client_max_body_size 50M;

    # ============================================
    # PHP 处理
    # ============================================
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $backend_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
    }

    # ============================================
    # 后端 API 和安装页面
    # ============================================
    location ~ ^/api/(.+)$ {
        rewrite ^/api/(.+)$ /index.php?s=/api/$1&$args? last;
    }

    # ============================================
    # 安装页面目录
    # ============================================
    location /install/ {
        alias $backend_root/install/;
        
        # PHP 文件
        location ~ \.php$ {
            fastcgi_pass php:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $backend_root/install/install.php;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param PATH_TRANSLATED $backend_root/install/$fastcgi_path_info;
            include fastcgi_params;
        }
        
        # 静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # ============================================
    # 后台 API /adminapi/
    # ============================================
    location ~ ^/adminapi/(.+)$ {
        rewrite ^/adminapi/(.+)$ /index.php?s=/adminapi/$1&$args? last;
    }

    # ============================================
    # PC API /pcapi/
    # ============================================
    location ~ ^/pcapi/(.+)$ {
        rewrite ^/pcapi/(.+)$ /index.php?s=/pcapi/$1&$args? last;
    }

    # ============================================
    # 移动端 API /api/ (uniapp)
    # ============================================
    location ~ ^/api/(.+)$ {
        rewrite ^/api/(.+)$ /index.php?s=/$1&$args? last;
    }

    # ============================================
    # 后台管理前端 /admin/
    # ============================================
    location ^~ /admin/ {
        alias $admin_root/;
        index index.html;

        try_files $uri $uri/ /admin/index.html;
    }

    # ============================================
    # PC 端前台 /pc/
    # ============================================
    location ^~ /pc/ {
        alias $pc_root/;
        index index.html;

        # PC 前端 API 代理
        location ~ ^/pc/api/(.*)$ {
            proxy_pass http://php/index.php?s=/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        try_files $uri $uri/ /pc/index.html;
    }

    # ============================================
    # 移动端 H5 /mobile/
    # ============================================
    location ^~ /mobile/ {
        alias $mobile_root/;
        index index.html;

        # 移动端 API 代理
        location ~ ^/mobile/api/(.*)$ {
            proxy_pass http://php/index.php?s=/$1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        try_files $uri $uri/ /mobile/index.html;
    }

    # ============================================
    # 静态资源缓存
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root $backend_root;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 隐藏文件
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
