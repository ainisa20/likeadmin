version: '3'

networks:
  likeadmin:
    driver: bridge

services:
  nginx:
    container_name: likeadmin-nginx
    image: nginx:1.23-alpine
    restart: always
    depends_on:
      - "php"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./server:/var/www/html/server
      - ./admin/dist:/usr/share/nginx/html/admin
      - ./pc/.output/public:/usr/share/nginx/html/pc
      - ./uniapp/dist/build/h5:/usr/share/nginx/html/mobile
      - ./logs/nginx:/var/log/nginx
    networks:
      - likeadmin
    ports:
      - "18088:80"

  php:
    build: ./docker/php
    container_name: likeadmin-php
    restart: always
    working_dir: /var/www/html/server
    volumes:
      - ./server:/var/www/html/server
    networks:
      - likeadmin
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    platform: linux/arm64/v8
    container_name: likeadmin-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: moon5201314
      MYSQL_DATABASE: likeadmin
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - likeadmin
    ports:
      - "13306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: likeadmin-redis
    restart: always
    volumes:
      - ./data/redis:/data
    networks:
      - likeadmin
    ports:
      - "16397:6379"
